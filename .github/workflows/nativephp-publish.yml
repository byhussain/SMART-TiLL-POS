name: NativePHP Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this version'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: nativephp-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish All Platforms
    runs-on: macos-latest

    env:
      # ── Secrets (cannot live in .env.example) ────────────────────────────────
      APP_KEY: ${{ secrets.APP_KEY }}
      GITHUB_TOKEN: ${{ secrets.NATIVEPHP_GITHUB_TOKEN }}
      NATIVEPHP_APPLE_ID: ${{ secrets.NATIVEPHP_APPLE_ID }}
      NATIVEPHP_APPLE_ID_PASS: ${{ secrets.NATIVEPHP_APPLE_ID_PASS }}
      NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.NATIVEPHP_APPLE_TEAM_ID }}
      NATIVEPHP_APPLE_SIGNING_IDENTITY: ${{ secrets.NATIVEPHP_APPLE_SIGNING_IDENTITY }}
      # ── Workflow-specific (dynamic, cannot live in .env.example) ─────────────
      NATIVEPHP_RELEASE_NOTES: ${{ github.event.inputs.release_notes || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Apple Developer ID certificate into keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, fileinfo, pdo_sqlite, sqlite3, zip
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare environment
        run: |
          cp .env.example .env
          php -r "
            \$env = file_get_contents('.env');
            \$env = preg_replace('/^APP_KEY=.*/m', 'APP_KEY=' . getenv('APP_KEY'), \$env);
            file_put_contents('.env', \$env);
          "
          mkdir -p database
          touch database/database.sqlite

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Install NativePHP Electron node_modules
        working-directory: nativephp/electron
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install NativePHP
        run: php artisan native:install --publish --no-interaction

      - name: Restore customised files overwritten by native:install
        run: |
          git restore nativephp/electron/build/icon.png
          git restore nativephp/electron/electron-builder.mjs
          git restore nativephp/electron/package.json

      - name: Publish NativePHP for all platforms
        run: php artisan native:publish all --no-interaction

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
